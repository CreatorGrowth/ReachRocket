<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Growth - Coming Soon</title>

<link rel="shortcut icon" href="images.png">

<script src="https://kit.fontawesome.com/a2d9d5b4b6.js"></script>

<style>

/* GLOBAL */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b1220;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* BOX */
.container{
max-width:500px;
padding:40px;
background:#1e293b;
border-radius:15px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* ICON */
.icon{
font-size:60px;
color:#e1306c;
margin-bottom:15px;
}

/* TEXT */
h1{
font-size:2rem;
margin-bottom:10px;
}

p{
color:#94a3b8;
line-height:1.6;
margin-top:10px;
}

/* BUTTON */
button{
margin-top:25px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#3b82f6;
color:#fff;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#2563eb;
transform:translateY(-2px);
}

/* SPINNER */
.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #e1306c;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<div class="icon">
<i class="fa-brands fa-instagram"></i>
</div>

<h1>Instagram Growth</h1>

<div class="spinner"></div>

<h2>Coming Soon</h2>

<p>
We are currently setting up Instagram growth tools.
This feature will be available soon.
</p>

<p>
Please check back later or continue with TikTok for now.
</p>

<button onclick="goBack()">Back</button>

</div>

<script>
function goBack(){
window.history.back();
}
</script>

</body>
</html>
