<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="images.png" type="image/x-icon">
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #1e293b;
      padding: 28px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    .logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 14px;
    }

    .highlight {
      color: #60a5fa;
      font-weight: bold;
    }

    .btn {
      margin-top: 18px;
      display: inline-block;
      padding: 12px 16px;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #fe2c55;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: -10px;
      width: 8px;
      height: 14px;
      opacity: 0.8;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    /* MEDIA QUERY (MOBILE) */
    @media (max-width: 480px) {
      .card {
        padding: 20px;
        border-radius: 10px;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 13px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .logo {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <img class="logo" src="images.png" alt="Logo">

    <h1>Thank You!</h1>

    <p>
      Your application has been received successfully.<br><br>

      Our team is currently reviewing your information.
      This process typically takes <span class="highlight">24–48 hours</span>.<br><br>

      Once your account has been processed, we'll notify you with the next steps.<br><br>

      Thank you for choosing <span class="highlight">Creators Growth</span>.
    </p>

    <a class="btn" href="https://www.tiktok.com" target="_blank">
      Continue to TikTok
    </a>
  </div>

  <script>
    const colors = ["#60a5fa", "#f472b6", "#34d399", "#facc15", "#ffffff"];

    function createConfetti() {
      const confetti = document.createElement("div");
      confetti.classList.add("confetti");

      confetti.style.left = Math.random() * window.innerWidth + "px";
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

      document.body.appendChild(confetti);

      setTimeout(() => confetti.remove(), 5000);
    }

    setInterval(createConfetti, 120);
  </script>

</body>
</html>
